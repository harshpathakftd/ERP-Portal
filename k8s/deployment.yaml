apiVersion: apps/v1
kind: Deployment

metadata:
  name: devops-sonarqube-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: devops-sonarqube-app

  template:

    metadata:
      labels:
        app: devops-sonarqube-app

    spec:

      containers:

      - name: devops-sonarqube-container

        image: shivsoftapp/devops-sonarqube-image:33

        ports:
        - containerPort: 5000