apiVersion: apps/v1
kind: Deployment

metadata:
name: erp-deployment
labels:
app: erp-app

spec:
replicas: 2

strategy:
type: RollingUpdate
rollingUpdate:
maxUnavailable: 1
maxSurge: 1

selector:
matchLabels:
app: erp-app

template:


metadata:
  labels:
    app: erp-app

spec:

  containers:

  - name: erp-container

    # Jenkins will dynamically update this image tag
    image: shivsoftapp/sonar-erp:latest

    imagePullPolicy: Always

    ports:
    - containerPort: 8000

    # Resource limits (important for production)
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"

    # Health check
    livenessProbe:
      httpGet:
        path: /
        port: 8000
      initialDelaySeconds: 30
      periodSeconds: 10

    readinessProbe:
      httpGet:
        path: /
        port: 8000
      initialDelaySeconds: 15
      periodSeconds: 5

  restartPolicy: Always

