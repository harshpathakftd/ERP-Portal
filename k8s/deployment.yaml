apiVersion: apps/v1
kind: Deployment

metadata:
  name: devops-sonarqube-app
  labels:
    app: devops-sonarqube

spec:
  replicas: 2

  selector:
    matchLabels:
      app: devops-sonarqube

  template:

    metadata:
      labels:
        app: devops-sonarqube

    spec:

      containers:

      - name: devops-container

        image: shivsoftapp/devops-sonarqube-image:33

        imagePullPolicy: Always

        ports:
        - containerPort: 8000