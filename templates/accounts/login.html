<!DOCTYPE html>
<html>
<head>
    <title>ERP Login</title>

    <style>
        body{
            background:#2c3e50;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:white;
            padding:30px;
            width:300px;
            border-radius:8px;
            box-shadow:0 0 10px rgba(0,0,0,0.3);
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
        }

        button{
            width:100%;
            padding:10px;
            margin-top:15px;
            background:#3498db;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:#2980b9;
        }

    </style>

</head>
<body>

<div class="login-box">

<h2>ERP Login</h2>

<form method="POST">
    {% csrf_token %}

    <label>Username</label>
    <input type="text" name="username" required>

    <label>Password</label>
    <input type="password" name="password" required>

    <button type="submit">Login</button>

</form>

</div>

</body>
</html>
