<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ERP</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --text: #111827;
            --muted: #6b7280;
            --border: #d1d5db;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top right, #818cf8 0%, #1e1b4b 42%, #0f172a 100%);
            padding: 20px;
        }

        .login-shell {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1.1fr 1fr;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 25px 70px rgba(15, 23, 42, 0.35);
        }

        .hero {
            background: linear-gradient(170deg, #4f46e5 0%, #1d4ed8 100%);
            color: #fff;
            padding: 42px 34px;
        }

        .hero h1 {
            margin: 0;
            font-size: 30px;
        }

        .hero p {
            margin-top: 14px;
            line-height: 1.6;
            color: #e0e7ff;
        }

        .panel {
            padding: 34px;
        }

        .panel h2 {
            margin: 0 0 8px 0;
        }

        .panel .muted {
            margin: 0 0 20px 0;
            color: var(--muted);
            font-size: 14px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 12px;
            margin-bottom: 15px;
            font-size: 14px;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        button {
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 12px 14px;
            color: #fff;
            background: var(--primary);
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background: var(--primary-dark);
        }

        @media (max-width: 860px) {
            .login-shell {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="login-shell">
        <section class="hero">
            <h1>ERP Management</h1>
            <p>
                Centralized workspace for HR, inventory, sales, purchase, finance and payroll.
                Log in to continue to your business dashboard.
            </p>
        </section>

        <section class="panel">
            <h2>Welcome Back</h2>
            <p class="muted">Use your credentials to access the system.</p>

            <form method="POST">
                {% csrf_token %}

                <label for="username">Username</label>
                <input id="username" type="text" name="username" required>

                <label for="password">Password</label>
                <input id="password" type="password" name="password" required>

                <button type="submit">Login</button>
            </form>
        </section>
    </div>
</body>
</html>
