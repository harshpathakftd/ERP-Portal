<!DOCTYPE html>
<html>
<head>
<title>Order List</title>
</head>

<body>

<h2>Order List</h2>

{% for order in orders %}

<hr>

<p>Order ID: {{ order.id }}</p>

<p>Customer: {{ order.customer.name }}</p>

<p>Total: {{ order.total }}</p>

<p>Date: {{ order.date }}</p>

{% empty %}

<p>No orders found</p>

{% endfor %}

<br>
<a href="/dashboard/">Back to Dashboard</a>

</body>
</html>
